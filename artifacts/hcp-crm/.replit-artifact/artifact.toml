kind = "web"
previewPath = "/"
title = "AI-First CRM – HCP Module"
version = "1.0.0"
id = "artifacts/hcp-crm"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18580

[services.development]
run = "pnpm --filter @workspace/hcp-crm run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hcp-crm", "run", "build" ]
publicDir = "artifacts/hcp-crm/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18580"
BASE_PATH = "/"
